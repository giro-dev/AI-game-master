spring:
  application:
    name: master-server

  # Google Gemini AI Configuration
  ai:
    google:
      genai:
        api-key: ${GOOGLE_GENAI_API_KEY}
        chat:
          options:
            model: gemini-2.5-flash
            temperature: 0.7
        embedding:
          api-key: ${GOOGLE_GENAI_API_KEY}
          options:
            model: gemini-embedding-001

  datasource:
    url: jdbc:postgresql://localhost:35555/masterdb
    username: masteruser
    password: masterpassword
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

# Gemini HTTP API configuration used by the custom client

logging:
  level:
    root: warn
    com.example.masterserver: debug