spring:
  application:
    name: master-server

  docker:
    compose:
      enabled: true
      lifecycle-management: start-only
      file: docker-compose.yml

  datasource:
    url: jdbc:postgresql://localhost:5432/gamemaster
    username: gamemaster
    password: gamemaster

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

  # Google Gemini AI Configuration
  ai:
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: always
    openai:
      api-key: ${OPENAI_API_KEY}
      embedding:
        options:
          model: text-embedding-3-small
        project-id: ${GM-PROJECT}
    google:
      genai:
        api-key: ${GOOGLE_GENAI_API_KEY}
        chat:
          options:
            model: gemini-2.5-flash
            temperature: 0.7
        embedding:
          api-key: ${GOOGLE_GENAI_API_KEY}
          options:
            model: gemini-embedding-001
    vectorstore:
      opensearch:
        uris: http://localhost:9200
        index-name: vector-store
        initialize-schema: true
        dimensions: 1536
        similarity: cosine
        use-approximate-knn: true

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

game-master:
  chat:
    default-language: catalan
    default-model: gpt-4.1-mini
  routing:
    enabled: true
    state-verification-enabled: false
    operations:
      intent-classifier:
        preferred-model: gpt-4.1-nano
        fallback-model: gpt-4.1-mini
        temperature: 0.0
        expected-format: json
        max-tokens: 256
        latency-budget-ms: 2000
      roll-decision:
        preferred-model: gpt-4.1-nano
        fallback-model: gpt-4.1-mini
        temperature: 0.0
        expected-format: json
        max-tokens: 512
        latency-budget-ms: 3000
      manual-answer:
        preferred-model: gpt-4.1-mini
        fallback-model: gpt-4.1
        temperature: 0.3
        expected-format: text
        max-tokens: 1024
        latency-budget-ms: 8000
      director-stateful:
        preferred-model: gpt-4.1-mini
        fallback-model: gpt-4.1
        temperature: 0.7
        expected-format: json
        max-tokens: 2048
        latency-budget-ms: 15000
      state-verifier:
        preferred-model: gpt-4.1-mini
        fallback-model: gpt-4.1
        temperature: 0.0
        expected-format: json
        max-tokens: 512
        latency-budget-ms: 5000
      concept-agent:
        preferred-model: gpt-4.1-mini
        fallback-model: gpt-4.1
        temperature: 0.8
        expected-format: json
        max-tokens: 1024
        latency-budget-ms: 10000
      field-filler:
        preferred-model: gpt-4.1-mini
        fallback-model: gpt-4.1
        temperature: 0.8
        expected-format: json
        max-tokens: 2048
        latency-budget-ms: 15000
      item-generator:
        preferred-model: gpt-4.1-mini
        fallback-model: gpt-4.1
        temperature: 0.8
        expected-format: json
        max-tokens: 2048
        latency-budget-ms: 15000
      entity-extractor:
        preferred-model: gpt-4.1-nano
        fallback-model: gpt-4.1-mini
        temperature: 0.1
        expected-format: json
        max-tokens: 1024
        latency-budget-ms: 8000
      adventure-ingestion:
        preferred-model: gpt-4.1-mini
        fallback-model: gpt-4.1
        temperature: 0.3
        expected-format: json
        max-tokens: 4096
        latency-budget-ms: 60000

whisper:
  url: http://localhost:9300
  model: large-v3
  language: ca

piper-tts:
  host: localhost
  port: 10200
  default-voice: ca_ES-upc_pau-x_low
  narrator-voice: ca_ES-upc_pau-x_low
  male-voices:
    - ca_ES-upc_pau-x_low
    - es_ES-davefx-medium
    - es_ES-carlfm-x_low
    - es_ES-mls_10246-low
    - es_ES-mls_9972-low
    - es_ES-sharvard-medium
  female-voices:
    - ca_ES-upc_ona-medium
    - ca_ES-upc_ona-x_low
    - es_AR-daniela-high
  voices:
    narrator: ca_ES-upc_pau-x_low
    npc_male_deep: es_ES-davefx-medium
    npc_female: ca_ES-upc_ona-medium

# ── TTS provider selection ─────────────────────────────────────────────────
# Set to 'openai' to use OpenAI gpt-4o-mini-tts (multilingual, expressive).
# Set to 'piper' (or omit) to use the local Wyoming-Piper service.
tts:
  provider: openai

openai-tts:
  model: gpt-4o-mini-tts
  narrator-voice: verse
  male-voices:
    - coral
    - ash
    - ballad
    - echo
    - fable
    - onyx
    - sage
    - shimmer
    - verse
    - cedar
    - alloy
  female-voices:
    - nova
    - coral
    - aria
  voices:
    narrator: verse
    npc_male_deep: coral
    npc_female: nova
    npc_neutral: alloy
  # Per-voice tone instructions (used when no per-NPC personality is available)
  instructions:
    verse:  "Speak with a captivating, slightly dramatic storytelling voice. Vary pace and tone for narrative effect."
    coral:  "Warm and approachable. Speak naturally as a friendly character in a role-playing adventure."
    nova:   "Energetic and expressive. Convey clear emotion matching the character's mood."
    aria:   "Soft, calm and natural. Gentle delivery with subtle warmth."
    alloy:  "Clear, balanced and neutral delivery."
    sage:   "Formal and measured. Professional tone appropriate for authority figures."
  narrator-instructions: >
    You are the Game Master narrator of a role-playing adventure.
    Speak with a captivating, slightly mysterious storytelling voice.
    Pace your narration for dramatic effect, varying tone to match the mood of the scene.
  npc-instructions: >
    You are a character in a role-playing adventure.
    Speak naturally and expressively to match your personality and current emotional state.

adventure:
  intent-confirmation-threshold: 0.7
  max-tension-level: 10

audio:
  store:
    # Directory where synthesized WAV clips are stored temporarily
    dir: ${java.io.tmpdir}/ai-gm-audio
    # URL prefix returned to clients (relative; must match AudioController mapping)
    base-url: /audio
    # Minutes before a stored audio file is eligible for cleanup
    ttl-minutes: 60


logging:
  level:
    root: warn
    dev.agiro.masterserver: debug
