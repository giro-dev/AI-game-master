spring:
  application:
    name: master-server

  docker:
    compose:
      enabled: true
      lifecycle-management: start-only
      file: docker-compose.yml

  datasource:
    url: jdbc:postgresql://localhost:5432/gamemaster
    username: gamemaster
    password: gamemaster

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

  # Google Gemini AI Configuration
  ai:
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: always
    openai:
      api-key: ${OPENAI_API_KEY}
      embedding:
        options:
          model: text-embedding-3-small
        project-id: ${GM-PROJECT}
    google:
      genai:
        api-key: ${GOOGLE_GENAI_API_KEY}
        chat:
          options:
            model: gemini-2.5-flash
            temperature: 0.7
        embedding:
          api-key: ${GOOGLE_GENAI_API_KEY}
          options:
            model: gemini-embedding-001
    vectorstore:
      opensearch:
        uris: http://localhost:9200
        index-name: vector-store
        initialize-schema: true
        dimensions: 1536
        similarity: cosine
        use-approximate-knn: true

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

game-master:
  chat:
    default-language: catalan
    default-model: gpt-4.1-mini

whisper:
  url: http://localhost:9300
  model: large-v3
  language: ca

piper-tts:
  host: localhost
  port: 10200
  default-voice: ca_balear-x_low
  voices:
    narrator: ca_balear-x_low
    npc_male_deep: es_ES-davefx-medium
    npc_female: es_ES-sharvard-medium
    npc_english: en_US-lessac-medium

adventure:
  intent-confirmation-threshold: 0.7
  max-tension-level: 10


logging:
  level:
    root: warn
    dev.agiro.masterserver: debug
