spring:
  application:
    name: master-server

  # Google Gemini AI Configuration
  ai:
    google:
      genai:
        api-key: ${GOOGLE_GENAI_API_KEY}
        chat:
          options:
            model: gemini-2.5-flash
            temperature: 0.7

  datasource:
    url: jdbc:postgresql://localhost:5432/masterdb
    username: masteruser
    password: masterpassword
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

# Gemini HTTP API configuration used by the custom client
gemini:
  api:
    url: ${GEMINI_API_URL:https://api.gemini.example/v1}
    key: ${GOOGLE_GENAI_API_KEY:}
